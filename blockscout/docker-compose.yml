version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: blockscout-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: blockscout
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: blockscout-redis
    restart: always
    ports:
      - "6380:6379"

  backend:
    image: ghcr.io/blockscout/blockscout:latest
    container_name: blockscout-backend
    restart: always
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database configuration
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/blockscout?ssl=false
      ECTO_USE_SSL: "false"
      
      # Ethereum node configuration
      ETHEREUM_JSONRPC_VARIANT: 'geth'
      ETHEREUM_JSONRPC_HTTP_URL: 'http://host.docker.internal:8545/'
      ETHEREUM_JSONRPC_TRACE_URL: 'http://host.docker.internal:8545/'
      ETHEREUM_JSONRPC_WS_URL: 'ws://host.docker.internal:8545/'
      
      # Blockchain and Currency configurations
      CHAIN_ID: '232425'
      COIN: 'ARES'
      COIN_NAME: 'ARES'
      METADATA_COIN_NAME: 'ARES'
      
      # Indexing and caching
      INDEXER_DISABLE_PENDING_TRANSACTIONS_INDEXER: "false"
      REDIS_URL: redis://redis:6379/1
      
      # Web / API Ports
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: blockscout-frontend
    restart: always
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # API endpoint for the UI
      PORT: 3000
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_APP_HOST: localhost
      NEXT_PUBLIC_APP_PORT: "9081"
      NEXT_PUBLIC_API_HOST: host.docker.internal
      NEXT_PUBLIC_API_PORT: "4000"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_USE_NEXT_JS_PROXY: "true"
      
      # Frontend currency display parameters
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: 'ARES'
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: 'ARES'
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: '18'
      NEXT_PUBLIC_NETWORK_NAME: 'Aries Network'
      NEXT_PUBLIC_NETWORK_ID: '232425'
    ports:
      - "9081:3000"

volumes:
  pg_data:
